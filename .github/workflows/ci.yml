name: CI

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v1
        with: 
          bun-version: latest
      
      - name:  install dependencies
        run: bun install
      
      - name:  test
        run: bun run test
      
      - name:  build
        run: bun run build
      